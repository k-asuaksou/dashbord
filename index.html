<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>経営ダッシュボード｜飛鳥荘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
/* =============================================
   飛鳥荘 経営ダッシュボード - スタイル
   ブランドカラー: インディゴ#1f2d4d / クリーム#faf6ee
   ============================================= */
:root{
  --accent:#1f2d4d;
  --accent-dark:#16223b;
  --accent-soft:#e7ebf2;
  --bg:#f4f0e8;
  --card:#ffffff;
  --text:#221d14;
  --muted:#64748b;
  --line:#ddd6ca;
  --gold:#c9a84c;
  --up:#16a34a;
  --down:#dc2626;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:"Noto Sans JP","Hiragino Sans",sans-serif;font-size:14px;background:var(--bg);color:var(--text);}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}

/* ====== レイアウト ====== */
#app{display:flex;flex-direction:column;min-height:100vh;}
header{background:var(--accent);color:#fff;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;flex-shrink:0;}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand h1{font-family:"Shippori Mincho",serif;font-size:18px;letter-spacing:.05em;}
.brand span{font-size:11px;opacity:.7;}
.header-right{display:flex;align-items:center;gap:10px;}
.api-badge{font-size:11px;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.15);white-space:nowrap;}
.api-badge.ok{background:rgba(40,180,100,.35);}
.api-badge.err{background:rgba(220,40,40,.35);}
.icon-btn{border:none;background:transparent;color:rgba(255,255,255,.8);font-size:16px;width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;}
.icon-btn:hover{background:rgba(255,255,255,.12);}

.page-body{flex:1;max-width:1320px;margin:0 auto;width:100%;padding:20px 16px;}

/* ====== タブナビ ====== */
.main-tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:20px;}
.main-tab{border:none;background:none;padding:10px 18px;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;}
.main-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.main-tab:hover:not(.active){color:var(--text);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ====== KPI カード ====== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
.kpi-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;border-top:3px solid var(--accent);}
.kpi-label{font-size:11.5px;color:var(--muted);margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;color:var(--accent);line-height:1.2;}
.kpi-sub{font-size:11.5px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px;}
.kpi-yoy{font-weight:700;}
.kpi-yoy.up{color:var(--up);}
.kpi-yoy.down{color:var(--down);}
.kpi-period{font-size:11px;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:4px;}

/* ====== セクション ====== */
.section{margin-bottom:28px;}
.section-header{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
.section-title{font-family:"Shippori Mincho",serif;font-size:16px;color:var(--accent);}
.section-sub{font-size:12px;color:var(--muted);}

/* ====== グラフ行 ====== */
.chart-grid{display:grid;gap:16px;}
.chart-grid.col2{grid-template-columns:1fr 1fr;}
.chart-grid.col3{grid-template-columns:1fr 1fr 1fr;}
.chart-box{background:var(--card);border-radius:var(--radius);padding:18px;min-height:260px;display:flex;flex-direction:column;}
.chart-box-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;}
.chart-wrap{flex:1;position:relative;}

/* ====== 稼働率テーブル ====== */
.data-table-wrap{overflow-x:auto;}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;}
table.data-table thead{background:var(--accent);color:#fff;}
table.data-table th{padding:8px 10px;text-align:right;font-weight:600;white-space:nowrap;}
table.data-table th:first-child{text-align:left;}
table.data-table td{padding:7px 10px;border-bottom:1px solid var(--line);text-align:right;}
table.data-table td:first-child{text-align:left;font-weight:600;}
table.data-table tbody tr:hover{background:#f8f5f0;}
.occ-bar{display:inline-block;height:8px;border-radius:4px;background:var(--accent);opacity:.7;vertical-align:middle;margin-right:4px;}

/* ====== アップロード画面 ====== */
.upload-section{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
.upload-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.upload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.upload-card{border:2px dashed var(--line);border-radius:10px;padding:16px;text-align:center;position:relative;transition:border-color .2s;}
.upload-card:hover{border-color:var(--accent);}
.upload-card.has-file{border-style:solid;border-color:var(--up);}
.upload-card label{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.upload-card .icon{font-size:28px;}
.upload-card .type-name{font-size:13px;font-weight:700;color:var(--accent);}
.upload-card .file-name{font-size:11px;color:var(--muted);word-break:break-all;}
.upload-card input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;}
.field input:focus,.field select:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
.upload-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{border-radius:8px;padding:9px 18px;font-size:13.5px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--text);}
.btn:hover{background:#f8f5f0;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.primary:hover{background:var(--accent-dark);}
.btn.primary:disabled{opacity:.5;cursor:not-allowed;}
.btn.danger{color:var(--down);border-color:#fecaca;}
.btn.danger:hover{background:#fef2f2;}
.btn.sm{padding:5px 12px;font-size:12px;}
.progress-wrap{margin-top:12px;display:none;}
.progress-bar{height:6px;border-radius:4px;background:var(--line);overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width .3s;}

/* ====== 履歴テーブル ====== */
.history-table{width:100%;border-collapse:collapse;font-size:13px;}
.history-table th{background:var(--accent);color:#fff;padding:8px 10px;text-align:right;}
.history-table th:first-child{text-align:left;}
.history-table td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:right;}
.history-table td:first-child{text-align:left;}
.history-table tr:hover td{background:#f8f5f0;}
.del-btn{border:1px solid #fecaca;background:#fff;color:var(--down);border-radius:6px;padding:3px 10px;font-size:11.5px;cursor:pointer;}
.del-btn:hover{background:#fef2f2;}

/* ====== API設定モーダル ====== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:440px;box-shadow:0 12px 32px rgba(0,0,0,.18);}
.modal-box h2{font-family:"Shippori Mincho",serif;font-size:18px;color:var(--accent);margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

/* ====== ローディング・エラー ====== */
.loading-txt{text-align:center;color:var(--muted);padding:40px;font-size:13px;}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.alert.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.alert.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
.alert.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}

.not-configured{text-align:center;padding:48px 20px;}
.not-configured h2{font-family:"Shippori Mincho",serif;color:var(--accent);font-size:20px;margin-bottom:10px;}
.not-configured p{color:var(--muted);font-size:13px;margin-bottom:20px;}

@media(max-width:768px){
  .chart-grid.col2,.chart-grid.col3{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .upload-meta{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <h1>飛鳥荘 経営ダッシュボード</h1>
      <span>Asuka-so Management Dashboard</span>
    </div>
    <div class="header-right">
      <span id="apiBadge" class="api-badge">未接続</span>
      <button class="icon-btn" id="settingsBtn" title="API設定">⚙</button>
    </div>
  </header>

  <div class="page-body">
    <nav class="main-tabs">
      <button class="main-tab active" data-tab="overview">📊 ダッシュボード</button>
      <button class="main-tab" data-tab="channel">🏷 チャネル分析</button>
      <button class="main-tab" data-tab="rooms">🏨 稼働率</button>
      <button class="main-tab" data-tab="upload">📂 CSVアップロード</button>
      <button class="main-tab" data-tab="history">📋 履歴管理</button>
    </nav>

    <!-- ======= ダッシュボードタブ ======= -->
    <div id="tab-overview" class="tab-content active">
      <div id="overviewContent"><div class="loading-txt">読み込み中...</div></div>
    </div>

    <!-- ======= チャネル分析タブ ======= -->
    <div id="tab-channel" class="tab-content">
      <div id="channelContent"><div class="loading-txt">読み込み中...</div></div>
    </div>

    <!-- ======= 稼働率タブ ======= -->
    <div id="tab-rooms" class="tab-content">
      <div id="roomsContent"><div class="loading-txt">読み込み中...</div></div>
    </div>

    <!-- ======= CSVアップロードタブ ======= -->
    <div id="tab-upload" class="tab-content">
      <div id="uploadContent">
        <div class="upload-section">
          <div class="upload-title">📅 集計期間の設定</div>
          <div class="upload-meta">
            <div class="field">
              <label>集計期間キー（例: 2026-05）</label>
              <input type="text" id="periodKey" placeholder="2026-05" />
            </div>
            <div class="field">
              <label>表示ラベル</label>
              <input type="text" id="periodLabel" placeholder="2026年5月" />
            </div>
            <div class="field">
              <label>集計期間1（帳票の期間1の日付文字列）</label>
              <input type="text" id="period1Label" placeholder="2026/05/01〜2026/05/31" />
            </div>
            <div class="field">
              <label>集計期間2（前年比較期間）</label>
              <input type="text" id="period2Label" placeholder="2025/05/01〜2025/05/31" />
            </div>
          </div>
        </div>

        <div class="upload-section">
          <div class="upload-title">📄 帳票CSVファイルを選択（Shift_JIS対応）</div>
          <div class="upload-grid">
            <div class="upload-card" id="uc-kamoku">
              <label>
                <span class="icon">📑</span>
                <span class="type-name">科目別売上集計表</span>
                <span class="file-name" id="fn-kamoku">クリックまたはドロップで選択</span>
                <input type="file" accept=".csv" data-type="kamoku" />
              </label>
            </div>
            <div class="upload-card" id="uc-kaido">
              <label>
                <span class="icon">🏨</span>
                <span class="type-name">部屋別稼働率集計表</span>
                <span class="file-name" id="fn-kaido">クリックまたはドロップで選択</span>
                <input type="file" accept=".csv" data-type="kaido" />
              </label>
            </div>
            <div class="upload-card" id="uc-atsukai">
              <label>
                <span class="icon">🔗</span>
                <span class="type-name">扱先別売上集計表</span>
                <span class="file-name" id="fn-atsukai">クリックまたはドロップで選択</span>
                <input type="file" accept=".csv" data-type="atsukai" />
              </label>
            </div>
            <div class="upload-card" id="uc-yoyaku">
              <label>
                <span class="icon">📝</span>
                <span class="type-name">予約区分別売上集計表</span>
                <span class="file-name" id="fn-yoyaku">クリックまたはドロップで選択</span>
                <input type="file" accept=".csv" data-type="yoyaku" />
              </label>
            </div>
            <div class="upload-card" id="uc-hasshin">
              <label>
                <span class="icon">🗾</span>
                <span class="type-name">発信地区分別売上集計表</span>
                <span class="file-name" id="fn-hasshin">クリックまたはドロップで選択</span>
                <input type="file" accept=".csv" data-type="hasshin" />
              </label>
            </div>
          </div>
        </div>

        <div style="margin-bottom:8px;display:flex;gap:10px;align-items:center;">
          <button class="btn primary" id="uploadAllBtn">すべてアップロード</button>
          <button class="btn" id="uploadClearBtn">選択をクリア</button>
        </div>
        <div class="progress-wrap" id="progressWrap">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px;" id="progressLabel">処理中...</div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div id="uploadAlerts"></div>
      </div>
    </div>

    <!-- ======= 履歴管理タブ ======= -->
    <div id="tab-history" class="tab-content">
      <div id="historyContent"><div class="loading-txt">読み込み中...</div></div>
    </div>
  </div>
</div>

<!-- ====== API設定モーダル ====== -->
<div id="settingsModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2>GAS Webアプリ URL 設定</h2>
    <p class="modal-sub">Google Apps Script でデプロイしたWebアプリのURLを設定してください。設定後、CSVデータをGoogleスプレッドシートへ保存できます。</p>
    <div class="field">
      <label>GAS WebアプリURL</label>
      <input type="text" id="settingsUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    </div>
    <div class="modal-actions">
      <button class="btn" id="settingsCancel">キャンセル</button>
      <button class="btn primary" id="settingsSave">保存</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* =====================================================================
 * 飛鳥荘 経営ダッシュボード - フロントエンドJS
 * ===================================================================== */

/* ---------- 設定 ---------- */
// GAS Webアプリ URL をここに直接書くこともできます（書いておくと設定不要）
const DEFAULT_GAS_URL = '';

const LS_URL_KEY = 'asuka:gasUrl';
function getGasUrl() { return (localStorage.getItem(LS_URL_KEY) || DEFAULT_GAS_URL || '').trim(); }
function setGasUrl(url) { localStorage.setItem(LS_URL_KEY, url.trim()); }

/* ---------- チャートカラー ---------- */
const COLORS = [
  '#1f2d4d','#c9a84c','#3b82f6','#16a34a','#dc2626','#9333ea',
  '#0891b2','#f59e0b','#64748b','#84cc16','#ec4899','#14b8a6',
  '#6366f1','#f97316','#0ea5e9','#8b5cf6',
];

/* ---------- グローバル状態 ---------- */
let summaryData = null;
let historyData = null;
const chartInstances = {};
const pendingFiles = {}; // type → File

/* ===================== CSV パーサー ===================== */
/* Shift_JIS / UTF-8 の両方に対応した汎用パーサー。
 * 帳票名・集計期間・合計行を検出して構造化する。 */

function decodeCSV(buffer) {
  // Shift_JIS(CP932)を先に試みる
  try {
    const sjis = new TextDecoder('shift_jis').decode(buffer);
    if (sjis.includes('集計期間') || sjis.includes('合計')) return sjis;
  } catch (e) { /* ignore */ }
  return new TextDecoder('utf-8', { fatal: false }).decode(buffer);
}

function parseCSVText(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  return lines.map(parseCsvLine_);
}

function parseCsvLine_(line) {
  const result = [];
  let current = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i + 1] === '"') { current += '"'; i++; }
      else inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      result.push(current.trim()); current = '';
    } else {
      current += ch;
    }
  }
  result.push(current.trim());
  return result;
}

function numStr(s) {
  const n = parseFloat(String(s || '').replace(/,/g, ''));
  return isNaN(n) ? 0 : n;
}

/* === 科目別売上帳票パーサー === */
function parseKamoku(rows) {
  // ヘッダー行(row6)を探す: 数量,金額,消費税,構成比 が並ぶ行
  let headerIdx = -1;
  for (let i = 0; i < rows.length; i++) {
    const joined = rows[i].join(',');
    if (joined.includes('数量') && joined.includes('金額') && joined.includes('構成比')) {
      // 2行ヘッダーになっているので最後のヘッダー行を使う
      headerIdx = i;
    }
  }

  const period1 = extractPeriod(rows, '集計期間１');
  const period2 = extractPeriod(rows, '集計期間２');

  const items = [];
  let currentKamokuGroup = '';

  for (let i = (headerIdx > 0 ? headerIdx + 1 : 6); i < rows.length; i++) {
    const r = rows[i];
    const col0 = String(r[0] || '').trim();
    const col1 = String(r[1] || '').trim(); // コード
    const col2 = String(r[2] || '').trim(); // 項目名

    // 合計行（「XX 合計」形式）はスキップ
    if (/合計/.test(col0) && col1 === '' && col2 === '') {
      currentKamokuGroup = col0.replace('　合計', '').replace(' 合計', '');
      continue;
    }
    // 総合計・総売上行で終了
    if (/^総合計/.test(col0) || /^総売上/.test(col0)) break;
    // 消費税・入湯税行はスキップ
    if (['消費税', '入湯税'].includes(col2)) continue;
    // データ行の条件: col2に項目名がある（col1=コードは空でも可）
    if (!col2) continue;

    const name = col2;

    // 科目別帳票の実際の列配置（実帳票を確認して確定）:
    // [0]=空, [1]=コード, [2]=項目名
    // [3..7]=日帰（数量,金額,消費税,空,構成比）
    // [8..11]=宿泊（数量,金額,消費税,構成比）
    // [12]=合計数量, [13]=合計金額, [14]=合計消費税, [15]=合計構成比, [16]=対2比率
    // [17]=前年数量, [18]=空, [19]=前年金額, [20]=空, [21]=空, [22]=前年構成比
    const period1qty = numStr(r[12] || r[3]  || 0);
    const period1amt = numStr(r[13] || r[4]  || 0);
    const period1pct = numStr(r[15] || r[7]  || 0);
    const period2amt = numStr(r[19] || r[17] || 0); // 前年金額はcol19（col20は空）
    const yoy        = numStr(r[16] || 0);

    items.push({
      code: col1, name, group: currentKamokuGroup,
      period1qty, period1amt, period1pct, period2amt, yoy,
    });
  }
  return { period1, period2, items };
}

/* === 稼働率帳票パーサー === */
function parseKaido(rows) {
  // ヘッダー行を探す: 「名称」か「稼働状況」がある行
  let headerIdx = -1;
  for (let i = 0; i < rows.length; i++) {
    const joined = rows[i].join(',');
    if (joined.includes('稼働率') && joined.includes('ADR')) { headerIdx = i; break; }
  }
  const header = headerIdx >= 0 ? rows[headerIdx] : [];

  function colIdx(keywords) {
    for (const kw of keywords) {
      const idx = header.findIndex((h) => String(h).includes(kw));
      if (idx >= 0) return idx;
    }
    return -1;
  }

  const nameIdx    = colIdx(['名称']);
  const totalIdx   = colIdx(['期間総数']);
  const soldIdx    = colIdx(['期間利用数']);
  // '稼働率(%)' を優先し '定員稼働率(%)' を除外するため、完全一致に近い形で検索
  const occIdx     = (() => {
    const idx = header.findIndex((h) => /^稼働率/.test(String(h)));
    return idx >= 0 ? idx : colIdx(['稼働率']);
  })();
  const guestIdx   = colIdx(['期間利用人数', '期間人数']);
  const salesIdx   = colIdx(['総売上']);
  const adrIdx     = colIdx(['ADR']);
  const revparIdx  = colIdx(['RevPAR']);

  const period1 = extractPeriod(rows, '');
  const items = [];

  for (let i = (headerIdx >= 0 ? headerIdx + 1 : 5); i < rows.length; i++) {
    const r = rows[i];
    const name = String(r[nameIdx >= 0 ? nameIdx : 0] || '').trim();
    if (!name || name.includes('合計') || name.startsWith('※') || name.startsWith('稼働率')) continue;
    // 部屋番号らしい場合のみ（数字始まり）
    if (!/^\d/.test(name)) continue;

    items.push({
      name,
      total:   numStr(r[totalIdx >= 0  ? totalIdx  : 1] || 0),
      sold:    numStr(r[soldIdx >= 0   ? soldIdx   : 3] || 0),
      occ:     numStr(r[occIdx >= 0    ? occIdx    : 4] || 0),
      guests:  numStr(r[guestIdx >= 0  ? guestIdx  : 7] || 0),
      sales:   numStr(r[salesIdx >= 0  ? salesIdx  : 11]|| 0),
      adr:     numStr(r[adrIdx >= 0    ? adrIdx    : 12]|| 0),
      revpar:  numStr(r[revparIdx >= 0 ? revparIdx : 15]|| 0),
    });
  }

  // 合計行
  const totRow = rows.find((r) => /^合計/.test(String(r[0] || '')));
  const totals = totRow ? {
    total:  numStr(totRow[totalIdx >= 0 ? totalIdx : 1] || 0),
    sold:   numStr(totRow[soldIdx >= 0  ? soldIdx  : 3] || 0),
    occ:    numStr(totRow[occIdx >= 0   ? occIdx   : 4] || 0),
    guests: numStr(totRow[guestIdx >= 0 ? guestIdx : 7] || 0),
    sales:  numStr(totRow[salesIdx >= 0 ? salesIdx : 11]|| 0),
    adr:    numStr(totRow[adrIdx >= 0   ? adrIdx   : 12]|| 0),
    revpar: numStr(totRow[revparIdx >= 0? revparIdx: 15]|| 0),
  } : null;

  return { period1, items, totals };
}

/* === 扱先別帳票パーサー === */
function parseAtsukai(rows) { return parseSalesByGroup_(rows, 'channel'); }

/* === 予約区分別帳票パーサー === */
function parseYoyaku(rows) { return parseSalesByGroup_(rows, 'yoyaku'); }

/* === 発信地別帳票パーサー === */
function parseHasshin(rows) { return parseSalesByGroup_(rows, 'hasshin'); }

/* 共通: 扱先/予約区分/発信地の帳票を解析
 * 帳票構造: データ行 → XX合計行 → 次のブロック のパターンなので
 * 2パス方式でグループを正しく割り当てる。
 * 列構成:
 *  [0]=大分類合計ラベル, [1]=コード, [2]=項目名
 *  [10]=合計数量, [11]=合計金額, [12]=合計構成比, [13]=対2比率
 *  [16]=前年金額
 */
function parseSalesByGroup_(rows, _kind) {
  const period1 = extractPeriod(rows, '集計期間１');
  const period2 = extractPeriod(rows, '集計期間２');

  // パス1: 合計行の位置からグループ区間を確定
  const groupRanges = []; // { start, end, group }
  let prevEnd = 7;
  for (let i = 7; i < rows.length; i++) {
    const col0 = String(rows[i][0] || '').trim();
    const col1 = String(rows[i][1] || '').trim();
    const col2 = String(rows[i][2] || '').trim();
    if (/合計/.test(col0) && col1 === '' && col2 === '') {
      const grp = col0.replace(/[　\s]合計$/, '');
      if (/^総/.test(grp)) break; // 総合計で終了
      groupRanges.push({ start: prevEnd, end: i, group: grp });
      prevEnd = i + 1;
    }
  }

  // パス2: グループ区間内のデータ行を処理
  const items = [];
  for (const { start, end, group } of groupRanges) {
    for (let i = start; i < end; i++) {
      const r = rows[i];
      const col1 = String(r[1] || '').trim();
      const col2 = String(r[2] || '').trim();
      if (['その他商品', '消費税', '入湯税', '未指定', '種別 未指定'].includes(col2)) continue;
      const name = col2 || String(r[0] || '').trim();
      if (!name) continue;

      const qty    = numStr(r[10] || 0);
      const amt    = numStr(r[11] || 0);
      const pct    = numStr(r[12] || 0);
      const prevAmt= numStr(r[16] || r[15] || 0);
      const yoy    = numStr(r[13] || 0);

      if (amt === 0 && qty === 0) continue;

      items.push({ group, code: col1, name: name.trim(), qty, amt, pct, prevAmt, yoy });
    }
  }

  return { period1, period2, items };
}

function extractPeriod(rows, keyword) {
  for (const r of rows) {
    const s = r.join(',');
    if (!keyword || s.includes(keyword)) {
      const m = s.match(/(\d{4}\/\d{2}\/\d{2})\s*[\(（]?.+?[\)）]?\s*[〜~]\s*(\d{4}\/\d{2}\/\d{2})/);
      if (m) return m[0];
    }
  }
  return '';
}

/* ===================== GAS API 連携 ===================== */

async function gasGet(params) {
  const url = getGasUrl();
  if (!url) return { ok: false, error: 'GAS URLが未設定です' };
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(url + '?' + qs);
  return res.json();
}

async function gasPost(payload) {
  const url = getGasUrl();
  if (!url) return { ok: false, error: 'GAS URLが未設定です' };
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload),
  });
  return res.json();
}

/* ===================== GASへのデータ変換・アップロード ===================== */

function kamokuToRows(parsed, periodKey) {
  return parsed.items.map((it) => [
    periodKey, it.code, it.name, it.group,
    it.period1qty, it.period1amt, it.period1pct,
    it.period2amt, 0, it.yoy,
  ]);
}

function kaidoToRows(parsed, periodKey) {
  return parsed.items.map((it) => [
    periodKey, it.name,
    it.total,   // 期間総数（期間中の日数×部屋数）
    it.total,   // 販売可能数（同上・稼働率帳票では同値）
    it.sold,    // 期間利用数
    it.occ,     // 稼働率
    it.guests,  // 期間利用人数
    it.sales,   // 総売上
    it.adr,     // ADR
    it.revpar,  // RevPAR
  ]);
}

function groupToRows(parsed, periodKey) {
  return parsed.items.map((it) => [
    periodKey, it.group, it.name, it.qty, it.amt, it.pct, it.prevAmt, it.yoy,
  ]);
}

/* --- KPI カード --- */
function fmt(v, isCur = true) {
  if (v == null || v === '' || v === 0) return '—';
  if (isCur) return '¥' + Math.round(v).toLocaleString();
  return Number(v).toLocaleString();
}
function fmtPct(v) {
  if (v == null || v === '') return '—';
  return Number(v).toFixed(1) + '%';
}
function yoyBadge(v) {
  if (v == null || v === '') return '';
  const n = Number(v);
  if (isNaN(n)) return '';
  const cls = n >= 0 ? 'up' : 'down';
  const sign = n >= 0 ? '▲' : '▼';
  return `<span class="kpi-yoy ${cls}">${sign}${Math.abs(n).toFixed(1)}%</span>`;
}

function renderKpiCards(latest, yoy, _periods) {
  if (!latest) return '<div class="loading-txt">データがありません。CSVをアップロードしてください。</div>';

  // 前年比を対2比率から計算（稼働率集計から算出）
  const kpiList = [
    { label: '総売上', value: fmt(latest['総売上']),   sub: latest['表示ラベル'] || latest['集計期間KEY'] },
    { label: '宿泊売上', value: fmt(latest['宿泊売上']), sub: '宿泊科目合計' },
    { label: '稼働率', value: fmtPct(latest['稼働率']), sub: '全室平均' },
    { label: 'ADR', value: fmt(latest['ADR']),         sub: '客室平均単価' },
    { label: 'RevPAR', value: fmt(latest['RevPAR']),   sub: '販売可能室あたり収益' },
    { label: '販売室数', value: fmt(latest['販売室数'], false), sub: '延べ室数' },
    { label: '利用人数', value: fmt(latest['利用人数'], false), sub: '延べ人数' },
    { label: '客単価', value: fmt(latest['客単価']),   sub: '総売上÷利用人数' },
  ];

  let html = `<div class="kpi-grid">`;
  kpiList.forEach((k) => {
    html += `<div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub"><span>${k.sub}</span></div>
    </div>`;
  });
  html += `</div>`;
  if (yoy !== null) {
    html = `<div class="alert warn" style="margin-bottom:14px;">前年同月比（総売上）: ${yoyBadge(yoy)} ${Number(yoy) >= 0 ? '前年を上回っています' : '前年を下回っています'}</div>` + html;
  }
  return html;
}

/* --- チャネル別ドーナツ・棒グラフ --- */
function renderChannelCharts(channelData) {
  if (!channelData || channelData.length === 0) return;

  // グループ別集計
  const groupMap = {};
  channelData.forEach((d) => {
    const g = String(d['カテゴリ'] || d['チャネル名'] || 'その他');
    if (!groupMap[g]) groupMap[g] = 0;
    groupMap[g] += numStr(d['期間1金額']);
  });

  const labels = Object.keys(groupMap);
  const values = labels.map((l) => groupMap[l]);

  // ドーナツ
  const cnv = document.getElementById('channelDonut');
  if (cnv) {
    if (chartInstances['channelDonut']) chartInstances['channelDonut'].destroy();
    chartInstances['channelDonut'] = new Chart(cnv, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: COLORS }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } },
    });
  }

  // 詳細棒グラフ（個別チャネル）

      data: {
        labels: detailLabels,
        datasets: [

          { label: '前期（万円）', data: channelData.map((d) => Math.round(numStr(d['期間2金額']) / 10000)), backgroundColor: COLORS[8] },
        ],
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
      },
    });
  }
}

/* --- 予約区分別・発信地別グラフ --- */
function renderGroupChart(canvasId, data, labelKey, valueKey, title) {
  if (!data || data.length === 0) return;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

  const grouped = {};
  data.forEach((d) => {
    const g = String(d[labelKey] || 'その他');
    if (!grouped[g]) grouped[g] = 0;
    grouped[g] += numStr(d[valueKey]);
  });
  const sorted = Object.entries(grouped).sort((a, b) => b[1] - a[1]).slice(0, 15);

  chartInstances[canvasId] = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: sorted.map((e) => e[0]),
      datasets: [{ data: sorted.map((e) => Math.round(e[1] / 10000)), backgroundColor: COLORS }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } }, title: { display: true, text: title } },
    },
  });
}

    <div class="data-table-wrap"><table class="history-table">
    <thead><tr>
      <th>集計期間KEY</th><th>表示ラベル</th><th>集計期間1</th><th>総売上</th><th>稼働率</th><th>ADR</th><th>RevPAR</th><th>登録日時</th><th></th>
    </tr></thead><tbody>`;

  [...historyData].reverse().forEach((h) => {
    html += `<tr>
      <td>${h['集計期間KEY']}</td>
      <td>${h['表示ラベル'] || ''}</td>
      <td style="font-size:11px">${h['集計期間1'] || ''}</td>
      <td>${fmt(h['総売上'])}</td>
      <td>${fmtPct(h['稼働率'])}</td>
      <td>${fmt(h['ADR'])}</td>
      <td>${fmt(h['RevPAR'])}</td>
      <td style="font-size:11px">${String(h['登録日時'] || '').slice(0, 16).replace('T', ' ')}</td>
      <td><button class="del-btn" data-period="${h['集計期間KEY']}">削除</button></td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;
  document.getElementById('historyContent').innerHTML = html;

  document.querySelectorAll('.del-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const period = btn.getAttribute('data-period');
      if (!confirm(`「${period}」のデータを削除しますか？この操作は元に戻せません。`)) return;
      btn.disabled = true;
      const res = await gasPost({ action: 'delete', period });
      if (res.ok) {
        showAlert('historyContent', `${period} のデータを削除しました。`, 'success');
        await loadSummary();
        await loadHistory();
      } else {
        showAlert('historyContent', '削除に失敗しました: ' + res.error, 'error');
      }
    });
  });
}

/* ===================== アップロード処理 ===================== */

const PARSERS = {
  kamoku:  (rows) => { const p = parseKamoku(rows); return { rows: kamokuToRows(p, ''), period1: p.period1, period2: p.period2 }; },
  kaido:   (rows) => { const p = parseKaido(rows);   return { rows: kaidoToRows(p, ''),   period1: p.period1 }; },
  atsukai: (rows) => { const p = parseAtsukai(rows); return { rows: groupToRows(p, ''),   period1: p.period1, period2: p.period2 }; },
  yoyaku:  (rows) => { const p = parseYoyaku(rows);  return { rows: groupToRows(p, ''),   period1: p.period1, period2: p.period2 }; },
  hasshin: (rows) => { const p = parseHasshin(rows); return { rows: groupToRows(p, ''),   period1: p.period1, period2: p.period2 }; },
};

async function uploadAll() {
  const periodKey  = document.getElementById('periodKey').value.trim();
  const periodLabel= document.getElementById('periodLabel').value.trim();
  const p1Label    = document.getElementById('period1Label').value.trim();
  const p2Label    = document.getElementById('period2Label').value.trim();

  if (!periodKey) { showAlert('uploadAlerts', '集計期間キーを入力してください。', 'error'); return; }
  if (!getGasUrl()) { showAlert('uploadAlerts', 'GAS WebアプリURLが未設定です。⚙ から設定してください。', 'error'); return; }

  const types = Object.keys(pendingFiles);
  if (types.length === 0) { showAlert('uploadAlerts', 'CSVファイルが選択されていません。', 'error'); return; }

  document.getElementById('uploadAllBtn').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('uploadAlerts').innerHTML = '';

  let done = 0;
  const errors = [];

  for (const type of types) {
    setProgress(done, types.length, `${type} を処理中...`);
    const file = pendingFiles[type];
    try {
      const buffer = await file.arrayBuffer();
      const text   = decodeCSV(buffer);
      const rows   = parseCSVText(text);
      const parsed = PARSERS[type](rows);

      // 集計期間を自動補完（入力欄が空の場合）
      if (!p1Label && parsed.period1) document.getElementById('period1Label').value = parsed.period1;
      if (!p2Label && parsed.period2) document.getElementById('period2Label').value = parsed.period2;

      // periodKeyをrowsの各行に埋め込む
      const dataRows = parsed.rows.map((r) => { r[0] = periodKey; return r; });

      const res = await gasPost({
        action: 'upload',
        type,
        period: periodKey,
        label: periodLabel || periodKey,
        period1Label: p1Label || parsed.period1 || '',
        period2Label: p2Label || parsed.period2 || '',
        rows: dataRows,
      });

      if (!res.ok) errors.push(`${type}: ${res.error}`);
    } catch (err) {
      errors.push(`${type}: ${err.message}`);
    }
    done++;
    setProgress(done, types.length, `${type} 完了`);
  }

  document.getElementById('uploadAllBtn').disabled = false;

  if (errors.length > 0) {
    showAlert('uploadAlerts', 'エラー: ' + errors.join(' / '), 'error');
  } else {
    showAlert('uploadAlerts', `${done}件の帳票をアップロードしました。ダッシュボードに反映されます。`, 'success');
    await loadSummary();
    await loadHistory();
  }
}

function setProgress(done, total, label) {
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressFill').style.width = Math.round((done / total) * 100) + '%';
}

function showAlert(containerId, msg, type) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const div = document.createElement('div');
  div.className = 'alert ' + type;
  div.textContent = msg;
  el.prepend(div);
  setTimeout(() => div.remove(), 8000);
}

/* ===================== 初期化・イベント ===================== */

function updateApiBadge() {
  const badge = document.getElementById('apiBadge');
  if (getGasUrl()) {
    badge.textContent = 'スプレッドシート連携中';
    badge.className = 'api-badge ok';
  } else {
    badge.textContent = '未接続';
    badge.className = 'api-badge err';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  updateApiBadge();

  /* タブ切替 */
  document.querySelectorAll('.main-tab').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.main-tab').forEach((b) => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach((c) => c.classList.remove('active'));
      btn.classList.add('active');
      const tabId = 'tab-' + btn.getAttribute('data-tab');
      document.getElementById(tabId).classList.add('active');
      // 履歴タブは都度リロード
      if (btn.getAttribute('data-tab') === 'history') loadHistory();
    });
  });

  /* API設定モーダル */
  document.getElementById('settingsBtn').addEventListener('click', () => {
    document.getElementById('settingsUrl').value = getGasUrl();
    document.getElementById('settingsModal').classList.remove('hidden');
  });
  document.getElementById('settingsCancel').addEventListener('click', () => {
    document.getElementById('settingsModal').classList.add('hidden');
  });
  document.getElementById('settingsSave').addEventListener('click', () => {
    setGasUrl(document.getElementById('settingsUrl').value);
    document.getElementById('settingsModal').classList.add('hidden');
    updateApiBadge();
    loadSummary();
    loadHistory();
  });
  document.getElementById('settingsModal').addEventListener('click', (e) => {
    if (e.target.id === 'settingsModal') document.getElementById('settingsModal').classList.add('hidden');
  });

  /* ファイル選択 */
  document.querySelectorAll('.upload-card input[type=file]').forEach((input) => {
    input.addEventListener('change', (e) => {
      const type = input.getAttribute('data-type');
      const file = e.target.files[0];
      if (!file) return;
      pendingFiles[type] = file;
      document.getElementById('fn-' + type).textContent = file.name;
      document.getElementById('uc-' + type).classList.add('has-file');
    });
  });

  /* 期間キー自動補完 */
  document.getElementById('periodKey').addEventListener('blur', (e) => {
    const v = e.target.value.trim(); // 例: 2026-05
    if (v && !document.getElementById('periodLabel').value) {
      const m = v.match(/^(\d{4})-(\d{2})$/);
      if (m) document.getElementById('periodLabel').value = `${m[1]}年${parseInt(m[2], 10)}月`;
    }
  });

  document.getElementById('uploadAllBtn').addEventListener('click', uploadAll);
  document.getElementById('uploadClearBtn').addEventListener('click', () => {
    Object.keys(pendingFiles).forEach((k) => delete pendingFiles[k]);
    document.querySelectorAll('.upload-card').forEach((c) => c.classList.remove('has-file'));
    document.querySelectorAll('.upload-card .file-name').forEach((el) => { el.textContent = 'クリックまたはドロップで選択'; });
    document.querySelectorAll('.upload-card input[type=file]').forEach((inp) => { inp.value = ''; });
  });

  /* 初回データ読み込み */
  if (getGasUrl()) {
    loadSummary();
    loadHistory();
  } else {
    document.getElementById('overviewContent').innerHTML = notConfiguredHtml();
    document.getElementById('channelContent').innerHTML  = notConfiguredHtml();
    document.getElementById('roomsContent').innerHTML    = notConfiguredHtml();
    document.getElementById('historyContent').innerHTML  = notConfiguredHtml();
  }
});
</script>
